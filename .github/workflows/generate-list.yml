name: Générer la liste anti-démarchage

# Déclenchement :
#   - tous les jours à 6h UTC (le fichier n'est republié que s'il a changé)
#   - manuellement via l'onglet Actions
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generer:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Générer la liste
        env:
          SIGNALEMENTS_URL: ${{ secrets.SIGNALEMENTS_URL }}
        run: |
          python scripts/generate_list.py "$SIGNALEMENTS_URL" demarchage_france.json

      - name: Publier si le contenu a changé
        run: |
          git config user.name "Serein Bot"
          git config user.email "bot@serein.local"

          # Le script produit TROIS fichiers :
          #   - demarchage_france.json    → la liste, consommée par l'app
          #   - tranches_operateurs.json → table tranche→opérateur, lue par l'Apps Script
          #   - stats.json               → observation (signalements par opérateur/groupe)
          #
          # ⚠️ On indexe AVANT de tester. `git diff` seul ne voit pas les fichiers
          # NON SUIVIS : tranches_operateurs.json et stats.json étant nouveaux, ils
          # étaient invisibles pour lui — écrits par le script, puis jetés à la fin
          # du job. C'est ce qui les empêchait d'être publiés.
          git add demarchage_france.json stats.json tranches_operateurs.json

          # `--cached` teste l'index, donc bien les trois fichiers, nouveaux comme
          # modifiés. Le comportement « ne publie que si ça a changé » est conservé.
          if git diff --cached --quiet; then
            echo "Contenu inchangé, rien à publier."
          else
            git commit -m "Mise à jour de la liste anti-démarchage"
            git push
            echo "Liste mise à jour et publiée."
          fi
